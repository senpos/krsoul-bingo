<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 KRSoul Bingo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="twice">

<div class="bg-grid"></div>
<div id="tsparticles" class="particle-layer" aria-hidden="true"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="theme-watermark">KRSoul</div>

<div x-data="app" x-init="init()" x-cloak>
  <div class="toast" id="toast" :class="{ show: toastVisible }" @click="hideToast()">
    <span class="toast-title">BINGO!</span>
    <p class="toast-sub">Congratulations! 🎉</p>
    <p class="toast-count" x-text="toastLabel"></p>
  </div>

  <div class="app-wrapper">
    <div class="game-view">
      <div class="container">
        <div class="header">
          <div class="badge">KRSoul ✦ GAME BINGO ✦ 2026</div>
          <h1 class="title">BINGO</h1>
          <p class="subtitle">Live interactive board</p>
        </div>

        <div class="idol-strip" aria-label="Theme selectors">
          <template x-for="t in themes" :key="t.id">
            <button @click="setTheme(t.id)" :class="{ 'theme-btn': true, active: theme === t.id }">
              <div class="theme-icon" x-text="t.icon"></div>
              <span class="theme-name" x-text="t.name"></span>
            </button>
          </template>
        </div>

        <div class="board-layout">
          <div class="mid-section">
            <div class="board-sidebar">
              <div class="sidebar-share-wrap">
                <button class="sidebar-share" @click="copyShareUrl()">
                  <span class="sidebar-share-icon">📋</span> Share
                </button>
                <div class="share-toast" :class="{ show: shareCopied }">
                  <span>Link copied!</span>
                </div>
              </div>
              <button class="sidebar-add" @click="addBoard()">+ Add board</button>
              <div class="sidebar-divider"></div>
              <div class="sidebar-boards" x-ref="boardScroll">
                <template x-for="board in boards" :key="board.id">
                  <div class="sidebar-tab"
                    :class="{
                      active: board.id === activeBoardId,
                      'sidebar-tab-pending': pendingDeleteBoardId === board.id
                    }"
                    @click="pendingDeleteBoardId === board.id ? deleteBoard(board.id) : switchBoard(board.id)"
                    @contextmenu.prevent="editBoardName(board.id)">
                    <span class="sidebar-tab-name" x-text="pendingDeleteBoardId === board.id ? 'Delete?' : board.name"></span>
                    <button class="tab-close"
                      @click.stop="deleteBoard(board.id)"
                      :disabled="boards.length <= 1"
                      x-show="boards.length > 1 && pendingDeleteBoardId !== board.id">&times;</button>
                  </div>
                </template>
              </div>
            </div>
            <div class="grid-wrap">
              <div class="bingo-grid" id="bingoGrid" :data-size="size" :style="{ gridTemplateColumns: `repeat(${size}, 1fr)`, gridTemplateRows: `repeat(${size}, minmax(0, 1fr))` }">
                <template x-for="cell in cells" :key="cell.index">
                  <div
                    @click="toggleMark(cell.index)"
                    @contextmenu.prevent="ctxOpen($event, cell.index)"
                    :class="{
                      'cell': true,
                      'marked': cell.marked,
                      'bingo-active': cell.bingoActive,
                      'bingo-new': cell.bingoNew,
                    }"
                  >
                        <span class="cell-icon">
                        <img x-show="cell.emoteUrl"
                          :src="cell.emoteUrl" :alt="cell.icon"
                          class="emote" loading="lazy"
                          @error="markEmoteError(cell.emoteUrl)">
                        <span x-show="!cell.emoteUrl" x-text="cell.iconParts[0]?.text || '\u2726'"></span>
                      </span>
                     <span class="cell-text" x-text="cell.label"></span>
                  </div>
                </template>
              </div>

              <svg id="bingoLines" class="bingo-lines-overlay" preserveAspectRatio="none"></svg>
            </div>
          </div>

          <div class="controls">
            <div class="btn-group">
              <button class="btn pink" @click="reset()">↺ Reset</button>
              <button class="btn cyan sm" @click="shuffle()">🔀 Shuffle</button>
              <button class="btn cyan sm" @click="undo()" :disabled="!canUndo">↩ Undo</button>
              <button class="btn cyan sm" @click="redo()" :disabled="!canRedo">↪ Redo</button>
            </div>
            <div class="score-pill" x-text="scoreText"></div>
            <div class="sidebar-size">
              <select class="size-select" @change="setSize(Number($el.value))">
                <template x-for="s in [3,4,5,6,7,8,9,10]" :key="s">
                  <option :value="s" :selected="size === s" x-text="s + '\u00D7' + s"></option>
                </template>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="editor-view" id="editorSection">
      <div class="container">
        <div class="editor-panel">

          <!-- ═══ Section: Cards ═══ -->
          <div class="editor-section">
            <div class="editor-section-head">
              <div class="editor-section-title">📝 Cards</div>
            </div>

            <div class="editor-textarea-wrapper">
              <div class="line-numbers">
                <template x-for="n in Math.max(cards.length, cellCount)" :key="n">
                  <div class="line-number" :class="{ unused: n > cellCount }" x-text="n <= cellCount ? n : '\u2715'"></div>
                </template>
              </div>
              <textarea id="cardsInput" class="cards-input" spellcheck="false"
                x-model="cardsText"
                rows="20"></textarea>
            </div>
          </div>

          <!-- ═══ Section: Emotes & Channels ═══ -->
          <div class="editor-section">
            <div class="editor-section-head">
              <div class="editor-section-title">😀 Emotes &amp; Channels</div>
            </div>

            <div class="emote-controls">
              <div class="auth-row">
                <template x-if="isLoggedIn">
                  <span class="twitch-user-badge" x-text="twitchUser?.display_name || twitchUser?.login"></span>
                </template>
                <template x-if="isLoggedIn">
                  <button class="btn twitch-logout" @click="logout()">Logout</button>
                </template>
                <template x-if="!isLoggedIn">
                  <div class="twitch-login-wrap">
                    <button class="btn twitch-login" @click="login()">
                      <span class="twitch-login-icon">🔗</span> Підключити Twitch
                    </button>
                    <div class="twitch-help" x-data="{ open: false }" @click.away="open = false">
                      <button class="twitch-help-btn" @click="open = !open" title="Що це дає?">?</button>
                      <div class="twitch-help-tooltip" x-show="open" x-cloak>
                        <p>Підключення Twitch дозволяє:</p>
                        <ul>
                          <li>Завантажувати ваші персональні емоції</li>
                          <li>Додавати канали за іменем (не тільки ID)</li>
                          <li>Автоматично додавати ваш канал у список</li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

              <div class="channel-list">
                <div class="channel-list-label">Канали:</div>
                <template x-for="id in twitchUserIds" :key="id">
                  <div class="channel-chip">
                    <span class="channel-id">
                      <template x-if="channelNameForId(id) !== id">
                        <span x-text="channelNameForId(id) + ' (' + id + ')'"></span>
                      </template>
                      <template x-if="channelNameForId(id) === id">
                        <span x-text="id"></span>
                      </template>
                    </span>
                    <button class="channel-remove"
                      @click="removeChannel(id)"
                      x-show="!isDefaultChannel(id)"
                      title="Видалити канал">&times;</button>
                  </div>
                </template>
                <div class="channel-add-row">
                  <input type="text" class="channel-add-input" placeholder="ID або назва каналу"
                    x-model="channelInput"
                    @keydown.enter="addChannel(channelInput); channelInput = ''">
                  <button class="channel-add-btn" @click="addChannel(channelInput); channelInput = ''">+</button>
                </div>
              </div>
            </div>

            <!-- Collapsible emote log -->
            <div class="emote-log">
              <button class="emote-log-toggle" @click="emoteLogOpen = !emoteLogOpen">
                <span class="emote-log-toggle-icon" x-text="emoteLogOpen ? '\u25BC' : '\u25B6'"></span>
                <span>Emote sources</span>
                <span class="emote-log-summary" x-text="emoteSourcesSummary"></span>
              </button>
              <div x-show="emoteLogOpen" class="emote-log-body">
                <template x-for="src in emoteSourceStatusList" :key="src.label">
                  <div class="emote-source-row" :class="'src-' + src.status">
                    <span class="src-icon" x-text="src.icon"></span>
                    <span class="src-label" x-text="src.label"></span>
                    <span class="src-status" x-text="src.statusText"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div x-show="ctxMenu.show" x-cloak class="context-menu"
    :style="{ left: ctxMenu.x + 'px', top: ctxMenu.y + 'px' }"
    @click.away="ctxMenu.show = false"
    @keydown.escape.window="ctxMenu.show = false">
    <button class="ctx-item" @click="editCellText()">✎ Edit text</button>
    <button class="ctx-item" @click="insertEmote()">😀 Insert emote...</button>
  </div>

  <!-- Emote Picker -->
  <div x-show="pickerOpen" x-cloak class="picker-overlay"
    @click.self="closePicker()" @keydown.escape.window="closePicker()">
    <div class="picker-panel">
      <div class="picker-sidebar">
        <template x-for="src in pickerSources" :key="src.id">
          <button
            @click="setPickerCategory(src.id)"
            :class="{ 'picker-cat-btn': true, active: pickerCategory === src.id }"
            :data-scope="src.scope">
            <span class="picker-cat-icon" :style="'background:' + src.color" x-text="src.iconText"></span>
            <span class="picker-cat-name" x-text="src.label"></span>
          </button>
        </template>
      </div>
      <div class="picker-main">
        <div class="picker-head">
          <input type="text" x-model="pickerSearch" placeholder="Search emotes..." class="picker-search"
            @keydown.escape="closePicker()">
          <button class="picker-close-btn" @click="closePicker()">✕</button>
        </div>
        <div class="picker-category-label" x-text="pickerCategoryLabel"></div>
        <div class="picker-grid" @scroll="onPickerScroll($event)">
          <template x-for="emote in visibleEmotes" :key="emote.provider + ':' + emote.id">
            <button class="picker-item" @click="pickEmote(emote)">
              <img :src="emote.url" :alt="emote.code" class="picker-img" loading="lazy" decoding="async">
              <span class="picker-code" x-text="emote.code"></span>
              <span class="picker-src" x-text="emote.provider.toUpperCase()"></span>
              <span class="picker-channel" x-show="emote.channelId" x-text="channelNameForId(emote.channelId)"></span>
            </button>
          </template>
          <div x-show="hasMoreEmotes" class="picker-sentinel">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
