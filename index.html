<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 KRSoul Bingo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="twice">

<div class="bg-grid"></div>
<div id="tsparticles" class="particle-layer" aria-hidden="true"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="theme-watermark">KRSoul</div>

<div x-data="app" x-init="init()" x-cloak>
  <div class="toast" id="toast" :class="{ show: toastVisible }" @click="hideToast()">
    <span class="toast-title">BINGO!</span>
    <p class="toast-sub">Congratulations! 🎉</p>
    <p class="toast-count" x-text="toastLabel"></p>
  </div>

  <div class="app-wrapper">
    <div class="game-view">
      <div class="container">
        <div class="header">
          <div class="badge">KRSoul ✦ GAME BINGO ✦ 2026</div>
          <h1 class="title">BINGO</h1>
          <p class="subtitle">Live interactive board</p>
          <div class="header-controls">
            <label>Board size</label>
            <input type="number" class="header-size-input"
              :value="size" @change="setSize(Number($el.value))"
              min="2" max="10">
          </div>
        </div>

        <div class="idol-strip" aria-label="Theme selectors">
          <template x-for="t in themes" :key="t.id">
            <button @click="setTheme(t.id)" :class="{ 'theme-btn': true, active: theme === t.id }">
              <div class="theme-icon" x-text="t.icon"></div>
              <span class="theme-name" x-text="t.name"></span>
            </button>
          </template>
        </div>

        <div class="board-tabs" x-show="boards.length > 0">
          <template x-for="board in boards" :key="board.id">
            <div class="board-tab"
              :class="{ active: board.id === activeBoardId, deleting: deletingBoardId === board.id }"
              :data-board-id="board.id">
              <span class="tab-name"
                x-show="deletingBoardId !== board.id"
                @click="switchBoard(board.id)"
                @dblclick="startRename(board.id)"
                x-text="board.name"></span>
              <input class="tab-name-input" :data-board-id="board.id"
                x-show="editingBoardId === board.id && deletingBoardId !== board.id"
                :value="board.name"
                @keydown.enter="renameBoard(board.id, $el.value); editingBoardId = null"
                @keydown.escape="editingBoardId = null"
                @blur="renameBoard(board.id, $el.value); editingBoardId = null"
                @click.stop maxlength="50">
              <div class="tab-confirm" x-show="deletingBoardId === board.id">
                Delete?
                <button class="tab-confirm-btn yes" @click.stop="executeDeleteBoard(board.id)">Yes</button>
                <button class="tab-confirm-btn no" @click.stop="cancelDeleteBoard()">No</button>
              </div>
              <button class="tab-close"
                @click.stop="confirmDeleteBoard(board.id)"
                :disabled="boards.length <= 1"
                x-show="deletingBoardId !== board.id && boards.length > 1">&times;</button>
            </div>
          </template>
          <button class="board-tab board-tab-new" @click="addBoard()" title="New board">+</button>
        </div>

        <div class="bingo-wrapper">
          <div class="bingo-headers" :style="{ gridTemplateColumns: `repeat(${size}, 1fr)` }">
            <template x-for="hdr in bingoHeaders" :key="hdr.text">
              <div class="bingo-letter" :class="hdr.cls" x-text="hdr.text"></div>
            </template>
          </div>

          <div class="bingo-grid" id="bingoGrid" :data-size="size" :style="{ gridTemplateColumns: `repeat(${size}, 1fr)`, gridTemplateRows: `repeat(${size}, minmax(0, 1fr))` }">
            <template x-for="cell in cells" :key="cell.index">
              <div
                @click="toggleMark(cell.index)"
                @contextmenu.prevent="ctxOpen($event, cell.index)"
                :class="{
                  'cell': true,
                  'marked': cell.marked,
                  'bingo-active': cell.bingoActive,
                  'bingo-new': cell.bingoNew,
                }"
              >
                  <span class="cell-icon">
                   <img x-show="cell.emoteUrl"
                     :src="cell.emoteUrl" :alt="cell.icon"
                     class="emote" loading="lazy">
                   <span x-show="!cell.emoteUrl" x-text="cell.iconParts[0]?.text || '\u2726'"></span>
                 </span>
                 <span class="cell-text" x-text="cell.label"></span>
              </div>
            </template>
          </div>

          <svg id="bingoLines" class="bingo-lines-overlay" preserveAspectRatio="none"></svg>
        </div>

        <div class="controls">
          <div class="btn-group">
            <button class="btn pink" @click="reset()">↺ Reset</button>
            <button class="btn cyan sm" @click="shuffle()">🔀 Shuffle</button>
            <button class="btn cyan sm" @click="undo()" :disabled="!canUndo">↩ Undo</button>
            <button class="btn cyan sm" @click="redo()" :disabled="!canRedo">↪ Redo</button>
          </div>
          <div class="score-pill" x-text="scoreText"></div>
        </div>
      </div>
    </div>

    <div class="editor-view" id="editorSection">
      <div class="container">
        <div class="editor-panel">
          <div class="editor-head">
            <div>
              <div class="editor-title">KRSoul Card Editor</div>
              <div class="editor-note">Unlimited lines. First <span x-text="cellCount"></span> are used on the board. Right-click any cell to edit or insert emotes. Use <code>|</code> to separate icon from text.</div>
            </div>
          </div>

          <div class="editor-toolbar">
            <button class="btn cyan sm" @click="copyShareUrl()">📋 Copy Share URL</button>
            <button class="btn cyan sm" @click="importBoardFromText()">📥 Import</button>
          </div>

          <div class="emote-controls">
            <template x-if="isLoggedIn">
              <div class="auth-row">
                <span class="twitch-user-badge" x-text="twitchUser?.display_name || twitchUser?.login"></span>
                <span class="resolved-user-badge" x-text="twitchUserId"></span>
                <button class="btn twitch-logout" @click="logout()">Logout</button>
              </div>
            </template>

            <template x-if="!isLoggedIn">
              <div class="auth-row">
                <button class="btn twitch-login" @click="login()">Login with Twitch</button>
                <label class="setting-field" for="channelUserId">
                  <span class="setting-label">Twitch Username / ID</span>
                  <div class="twitch-input-row">
                    <input id="channelUserId" class="setting-input" type="text" autocomplete="off" spellcheck="false"
                      placeholder="Enter Twitch username or ID"
                      :value="twitchUserId"
                      @input="onTwitchIdInput($event)">
                  </div>
                </label>
              </div>
            </template>
          </div>

          <div class="emote-status" x-text="emoteStatusMsg" :data-state="emoteStatusKind"></div>

          <div class="editor-textarea-wrapper">
            <div class="line-numbers">
              <template x-for="n in Math.max(cards.length, cellCount)" :key="n">
                <div class="line-number" :class="{ unused: n > cellCount }" x-text="n <= cellCount ? n : '\u2715'"></div>
              </template>
            </div>
            <textarea id="cardsInput" class="cards-input" spellcheck="false"
              x-model="cardsText"
              rows="20"></textarea>
          </div>

          <div class="editor-meta">
            <span x-text="cardsCountText"></span>
            <span>Right-click any cell to edit or insert emotes.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div x-show="ctxMenu.show" x-cloak class="context-menu"
    :style="{ left: ctxMenu.x + 'px', top: ctxMenu.y + 'px' }"
    @click.away="ctxMenu.show = false"
    @keydown.escape.window="ctxMenu.show = false">
    <button class="ctx-item" @click="editCellText()">✎ Edit text</button>
    <button class="ctx-item" @click="insertEmote()">😀 Insert emote...</button>
  </div>

  <!-- Emote Picker -->
  <div x-show="pickerOpen" x-cloak class="picker-overlay"
    @click.self="closePicker()" @keydown.escape.window="closePicker()">
    <div class="picker-panel">
      <div class="picker-sidebar">
        <template x-for="src in pickerSources" :key="src.id">
          <button
            @click="setPickerCategory(src.id)"
            :class="{ 'picker-cat-btn': true, active: pickerCategory === src.id }"
            :title="src.label"
            :data-scope="src.scope">
            <span class="picker-cat-icon" :style="'background:' + src.color" x-text="src.iconText"></span>
          </button>
        </template>
      </div>
      <div class="picker-main">
        <div class="picker-head">
          <input type="text" x-model="pickerSearch" placeholder="Search emotes..." class="picker-search"
            @keydown.escape="closePicker()">
          <button class="picker-close-btn" @click="closePicker()">✕</button>
        </div>
        <div class="picker-category-label" x-text="pickerCategoryLabel"></div>
        <div class="picker-grid" @scroll="onPickerScroll($event)">
          <template x-for="emote in visibleEmotes" :key="emote.provider + ':' + emote.id">
            <button class="picker-item" @click="pickEmote(emote)">
              <img :src="emote.url" :alt="emote.code" class="picker-img" loading="lazy" decoding="async">
              <span class="picker-code" x-text="emote.code"></span>
              <span class="picker-src" x-text="emote.provider.toUpperCase()"></span>
            </button>
          </template>
          <div x-show="hasMoreEmotes" class="picker-sentinel">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
